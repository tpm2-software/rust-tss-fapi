name: "tss2-fapi-rs-build"

services:
  build:
    build:
      context: ./
      dockerfile: rstss.Dockerfile
      args:
        IMAGE_VERSION_RSTSS: ${IMAGE_VERSION_RSTSS:?}
    volumes:
      - ../../../:/var/opt/rust/src:ro
      - out:/var/tmp/rust:rw
      - reg:/usr/local/cargo/registry:rw
    command:
      ${CARGO_CMD:-rebuild --release}

volumes:
  out:
  reg:
