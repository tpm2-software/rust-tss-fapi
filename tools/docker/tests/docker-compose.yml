name: "tss2-fapi-rs-tests"

services:
  tests:
    networks:
      tss2-fapi-rs-test-net:
        ipv4_address: 10.0.0.10
    build:
      context: ./
      dockerfile: tests.Dockerfile
      args:
        BASE_VERSION: ${BASE_VERSION_TESTS:-r27@sha256:64cf5005cb8c7868960c1608b2068d08b6a8c6a9d253a8a825aed5d8abb02617}
    volumes:
      - ../../../:/var/opt/rust/src:ro
      - log:/var/log/tss2-fapi-rs:rw
      - reg:/usr/local/cargo/registry:rw
    tmpfs:
      - /var/tmp/rust:exec
    environment:
      FAPI_RS_TEST_TCTI: "swtpm:host=10.0.0.20,port=2321"
      FAPI_RS_TEST_NAME: "${TEST_NAME-}"
      FAPI_RS_TEST_LOOP: "${TEST_LOOP:-5}"
      RUST_LOG: "${RUST_LOG:-info}"
      TSS2_LOG: "${TSS2_LOG:-all+none}"
      SWTPM_CTRL_ADDR: "10.0.0.20"
      SWTPM_CTRL_PORT: "2322"
      TEST_KEEP_RUNNING: "${KEEP_RUNNING:-0}"
      TEST_INCL_IGNORED: "${INCL_IGNORED:-0}"
    command:
      - "RSA2048SHA256"
      - "ECCP256SHA256"
    depends_on:
      - swtpm

  swtpm:
    networks:
      tss2-fapi-rs-test-net:
        ipv4_address: 10.0.0.20
    build:
      context: ../swtpm
      dockerfile: swtpm.Dockerfile
      args:
        BASE_VERSION: ${BASE_VERSION_SWTPM:-r26@sha256:c80dc0a4b6c3a1ab46be81931344178d5d3da3c21cfd00990c948c7f59a25557}
    volumes:
      - log:/var/log/swtpm:rw
    tmpfs:
      - /var/lib/swtpm
      - /var/lib/swtpm-localca
    restart: unless-stopped
    stop_signal: SIGKILL

networks:
  tss2-fapi-rs-test-net:
    ipam:
      driver: default
      config:
        - subnet: "10.0.0.0/24"

volumes:
  log:
  reg:
